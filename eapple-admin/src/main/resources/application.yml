# 骞冲彴鍩虹閰嶇疆
platform:
  # 骞冲彴鍚嶇О
  name: EduAfterSchool
  # 骞冲彴鐗堟湰
  version: 3.9.2
  # 鐗堟潈骞翠唤
  copyrightYear: 2026
  # 鏂囦欢涓婁紶璺緞
  profile: D:/qinghe/uploadPath
  # 鏄惁寮€鍚?IP 褰掑睘鍦版煡璇?  addressEnabled: false
  # 楠岃瘉鐮佺被鍨嬶細math 鎴?char
  captchaType: math

# 鏈嶅姟绔厤缃?server:
  # 鐩戝惉绔彛
  port: 8080
  servlet:
    # 搴旂敤涓婁笅鏂囪矾寰?    context-path: /
  tomcat:
    # URL 缂栫爜
    uri-encoding: UTF-8
    # 鏈€澶х瓑寰呴槦鍒楅暱搴?    accept-count: 1000
    threads:
      # 鏈€澶у伐浣滅嚎绋嬫暟
      max: 800
      # 鏈€灏忕┖闂茬嚎绋嬫暟
      min-spare: 100

# 鏃ュ織閰嶇疆
logging:
  level:
    com.eapple: debug
    org.springframework: warn

# 鐢ㄦ埛瀵嗙爜绛栫暐
user:
  password:
    # 鏈€澶ч噸璇曟鏁?    maxRetryCount: 5
    # 閿佸畾鏃堕棿锛屽崟浣嶅垎閽?    lockTime: 10

# Spring 閰嶇疆
spring:
  config:
    import: optional:classpath:application-private.yml
  messages:
    # 鍥介檯鍖栬祫婧愯矾寰?    basename: i18n/messages
  profiles:
    active: druid
  servlet:
    multipart:
      # 鍗曚釜鏂囦欢鏈€澶у€?      max-file-size: 10MB
      # 鍗曟璇锋眰鏈€澶у€?      max-request-size: 20MB
  jackson:
    time-zone: GMT+8
    date-format: yyyy-MM-dd HH:mm:ss
  devtools:
    restart:
      # 鐑儴缃插紑鍏?      enabled: true
  data:
    redis:
      # Redis 鍦板潃
      host: localhost
      # Redis 绔彛
      port: 6379
      # Redis 鏁版嵁搴撶储寮?      database: 0
      # Redis 瀵嗙爜
      password:
      # 杩炴帴瓒呮椂
      timeout: 10s
      lettuce:
        pool:
          # 鏈€灏忕┖闂茶繛鎺?          min-idle: 0
          # 鏈€澶х┖闂茶繛鎺?          max-idle: 8
          # 鏈€澶ц繛鎺ユ暟
          max-active: 8
          # 鏈€澶ч樆濉炵瓑寰呮椂闂?          max-wait: -1ms

# Token 閰嶇疆
token:
  # 浠ょ墝璇锋眰澶?  header: Authorization
  # 浠ょ墝瀵嗛挜
  secret: abcdefghijklmnopqrstuvwxyz
  # 浠ょ墝鏈夋晥鏈燂紝鍗曚綅鍒嗛挓
  expireTime: 30

# MyBatis 閰嶇疆
mybatis:
  # 鍒悕鍖呮壂鎻忚矾寰?  typeAliasesPackage: com.eapple.**.domain
  # Mapper XML 鎵弿璺緞
  mapperLocations: classpath*:mapper/**/*Mapper.xml
  # MyBatis 鍏ㄥ眬閰嶇疆鏂囦欢
  configLocation: classpath:mybatis/mybatis-config.xml

# PageHelper 鍒嗛〉鎻掍欢
pagehelper:
  helperDialect: mysql
  supportMethodsArguments: true
  params: count=countSql

# Springdoc 閰嶇疆
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    tags-sorter: alpha
  group-configs:
    - group: 'default'
      display-name: '榛樿鍒嗙粍'
      paths-to-match: '/**'
      packages-to-scan: com.eapple.web.controller.tool

# Referer 鐧藉悕鍗曢厤缃?referer:
  # 鏄惁鍚敤 Referer 鏍￠獙
  enabled: false
  # 鍏佽鐨勫煙鍚?  allowed-domains: localhost,127.0.0.1

# XSS 闃叉姢閰嶇疆
xss:
  # 鏄惁寮€鍚?XSS 闃叉姢
  enabled: true
  # 鎺掗櫎鐨勮矾寰?  excludes: /system/notice
  # 杩囨护鐨勮矾寰勮寖鍥?  urlPatterns: /system/*,/monitor/*,/tool/*

# 鏁欒偛骞冲彴 AI 閰嶇疆
edu:
  ai:
    enabled: true
    endpoint: https://api.siliconflow.cn/v1/chat/completions
    apiKey: ${SILICONFLOW_API_KEY:}
    model: Qwen/Qwen2.5-7B-Instruct
    timeoutSeconds: 90
    maxPromptLength: 1200
    bannedKeywords:
      - 鏆村姏
      - 姝ц
      - 闅愮


