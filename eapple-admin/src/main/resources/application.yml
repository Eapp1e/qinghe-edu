# 平台基础配置
platform:
  # 平台名称
  name: EduAfterSchool
  # 平台版本
  version: 3.9.2
  # 版权年份
  copyrightYear: 2026
  # 文件上传路径
  profile: D:/qinghe/uploadPath
  # 是否开启 IP 归属地查询
  addressEnabled: false
  # 验证码类型：math 或 char
  captchaType: math

# 服务端配置
server:
  # 监听端口
  port: 8080
  servlet:
    # 应用上下文路径
    context-path: /
  tomcat:
    # URL 编码
    uri-encoding: UTF-8
    # 最大等待队列长度
    accept-count: 1000
    threads:
      # 最大工作线程数
      max: 800
      # 最小空闲线程数
      min-spare: 100

# 日志配置
logging:
  level:
    com.eapple: debug
    org.springframework: warn

# 用户密码策略
user:
  password:
    # 最大重试次数
    maxRetryCount: 5
    # 锁定时间，单位分钟
    lockTime: 10

# Spring 配置
spring:
  config:
    import: optional:classpath:application-private.yml
  messages:
    # 国际化资源路径
    basename: i18n/messages
  profiles:
    active: druid
  servlet:
    multipart:
      # 单个文件最大值
      max-file-size: 10MB
      # 单次请求最大值
      max-request-size: 20MB
  jackson:
    time-zone: GMT+8
    date-format: yyyy-MM-dd HH:mm:ss
  devtools:
    restart:
      # 热部署开关
      enabled: true
  data:
    redis:
      # Redis 地址
      host: localhost
      # Redis 端口
      port: 6379
      # Redis 数据库索引
      database: 0
      # Redis 密码
      password:
      # 连接超时
      timeout: 10s
      lettuce:
        pool:
          # 最小空闲连接
          min-idle: 0
          # 最大空闲连接
          max-idle: 8
          # 最大连接数
          max-active: 8
          # 最大阻塞等待时间
          max-wait: -1ms

# Token 配置
token:
  # 令牌请求头
  header: Authorization
  # 令牌密钥
  secret: abcdefghijklmnopqrstuvwxyz
  # 令牌有效期，单位分钟
  expireTime: 30

# MyBatis 配置
mybatis:
  # 别名包扫描路径
  typeAliasesPackage: com.eapple.**.domain
  # Mapper XML 扫描路径
  mapperLocations: classpath*:mapper/**/*Mapper.xml
  # MyBatis 全局配置文件
  configLocation: classpath:mybatis/mybatis-config.xml

# PageHelper 分页插件
pagehelper:
  helperDialect: mysql
  supportMethodsArguments: true
  params: count=countSql

# Springdoc 配置
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    tags-sorter: alpha
  group-configs:
    - group: 'default'
      display-name: '默认分组'
      paths-to-match: '/**'
      packages-to-scan: com.eapple.web.controller.tool

# Referer 白名单配置
referer:
  # 是否启用 Referer 校验
  enabled: false
  # 允许的域名
  allowed-domains: localhost,127.0.0.1

# XSS 防护配置
xss:
  # 是否开启 XSS 防护
  enabled: true
  # 排除的路径
  excludes: /system/notice
  # 过滤的路径范围
  urlPatterns: /system/*,/monitor/*,/tool/*

# 教育平台 AI 配置
edu:
  ai:
    enabled: true
    endpoint: https://api.siliconflow.cn/v1/chat/completions
    apiKey: ${SILICONFLOW_API_KEY:}
    model: Qwen/Qwen2.5-7B-Instruct
    timeoutSeconds: 90
    maxPromptLength: 1200
    bannedKeywords:
      - 暴力
      - 歧视
      - 隐私
