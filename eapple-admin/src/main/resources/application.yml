# Platform base configuration
platform:
  # Full platform name
  name: QINGHE After-school Service Platform
  # Platform version
  version: 1.0
  # Copyright owner
  owner: EAPPLE
  # Copyright year
  copyrightYear: 2026
  # GitHub identity
  github: '@Eapp1e'
  # Upload root path
  profile: D:/qinghe/uploadPath
  # Enable IP address lookup
  addressEnabled: false
  # Captcha type: math or char
  captchaType: math

# Server configuration
server:
  port: 8080
  servlet:
    context-path: /
  tomcat:
    uri-encoding: UTF-8
    accept-count: 1000
    threads:
      max: 800
      min-spare: 100

# Logging configuration
logging:
  level:
    com.eapple: debug
    org.springframework: warn

# Password security policy
user:
  password:
    maxRetryCount: 5
    lockTime: 10

# Spring configuration
spring:
  config:
    import: optional:classpath:application-private.yml
  messages:
    basename: i18n/messages
  profiles:
    active: druid
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 20MB
  jackson:
    time-zone: GMT+8
    date-format: yyyy-MM-dd HH:mm:ss
  devtools:
    restart:
      enabled: true
  data:
    redis:
      host: localhost
      port: 6379
      database: 0
      password:
      timeout: 10s
      lettuce:
        pool:
          min-idle: 0
          max-idle: 8
          max-active: 8
          max-wait: -1ms

# Token configuration
token:
  header: Authorization
  secret: abcdefghijklmnopqrstuvwxyz
  expireTime: 30

# MyBatis configuration
mybatis:
  typeAliasesPackage: com.eapple.**.domain
  mapperLocations: classpath*:mapper/**/*Mapper.xml
  configLocation: classpath:mybatis/mybatis-config.xml

# PageHelper configuration
pagehelper:
  helperDialect: mysql
  supportMethodsArguments: true
  params: count=countSql

# OpenAPI configuration
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    tags-sorter: alpha
  group-configs:
    - group: 'default'
      display-name: 'Default'
      paths-to-match: '/**'
      packages-to-scan: com.eapple.web.controller.tool

# Referer whitelist
referer:
  enabled: false
  allowed-domains: localhost,127.0.0.1

# XSS protection
xss:
  enabled: true
  excludes: /system/notice
  urlPatterns: /system/*,/monitor/*,/tool/*

# QINGHE AI configuration
edu:
  ai:
    enabled: true
    endpoint: https://api.siliconflow.cn/v1/chat/completions
    apiKey: ${SILICONFLOW_API_KEY:}
    model: Qwen/Qwen2.5-7B-Instruct
    timeoutSeconds: 90
    maxPromptLength: 1200
    bannedKeywords:
      - 暴力
      - 歧视
      - 隐私
