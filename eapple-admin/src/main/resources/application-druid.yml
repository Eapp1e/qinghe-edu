# Data source configuration.
spring:
    datasource:
        type: com.alibaba.druid.pool.DruidDataSource
        driverClassName: com.mysql.cj.jdbc.Driver
        druid:
            # Primary database.
            master:
                url: jdbc:mysql://localhost:3306/${MYSQL_DATABASE:qinghe_edu}?createDatabaseIfNotExist=true&useUnicode=true&characterEncoding=utf8&zeroDateTimeBehavior=convertToNull&useSSL=true&serverTimezone=GMT%2B8
                username: root
                password: 123456
            # Secondary database, disabled by default.
            slave:
                enabled: false
                url:
                username:
                password:
            # Initial connection count.
            initialSize: 5
            # Minimum idle connections.
            minIdle: 10
            # Maximum active connections.
            maxActive: 20
            # Max wait time for acquiring a connection.
            maxWait: 60000
            # Connection timeout.
            connectTimeout: 30000
            # Socket timeout.
            socketTimeout: 60000
            # Idle connection validation interval.
            timeBetweenEvictionRunsMillis: 60000
            # Minimum idle lifetime.
            minEvictableIdleTimeMillis: 300000
            # Maximum idle lifetime.
            maxEvictableIdleTimeMillis: 900000
            # Connection validation query.
            validationQuery: SELECT 1 FROM DUAL
            testWhileIdle: true
            testOnBorrow: false
            testOnReturn: false
            webStatFilter:
                enabled: true
            statViewServlet:
                enabled: true
                # Empty allow list means all addresses are allowed.
                allow:
                url-pattern: /druid/*
                # Druid console account.
                login-username: qinghe
                login-password: 123456
            filter:
                stat:
                    enabled: true
                    # Slow SQL logging.
                    log-slow-sql: true
                    slow-sql-millis: 1000
                    merge-sql: true
                wall:
                    config:
                        multi-statement-allow: true
