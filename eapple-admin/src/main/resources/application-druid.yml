# 数据源配置
spring:
    datasource:
        type: com.alibaba.druid.pool.DruidDataSource
        driverClassName: com.mysql.cj.jdbc.Driver
        druid:
            # 主库数据源
            master:
                url: jdbc:mysql://localhost:3306/ry-vue?useUnicode=true&characterEncoding=utf8&zeroDateTimeBehavior=convertToNull&useSSL=true&serverTimezone=GMT%2B8
                username: root
                password: 123456
            # 从库数据源
            slave:
                # 从数据源开关，默认关闭
                enabled: false
                url:
                username:
                password:
            # 初始连接数
            initialSize: 5
            # 最小连接池数量
            minIdle: 10
            # 最大连接池数量
            maxActive: 20
            # 获取连接等待超时时间
            maxWait: 60000
            # 连接超时时间
            connectTimeout: 30000
            # 网络超时时间
            socketTimeout: 60000
            # 检测空闲连接的时间间隔，单位毫秒
            timeBetweenEvictionRunsMillis: 60000
            # 连接在池中的最小生存时间，单位毫秒
            minEvictableIdleTimeMillis: 300000
            # 连接在池中的最大生存时间，单位毫秒
            maxEvictableIdleTimeMillis: 900000
            # 检测连接是否有效
            validationQuery: SELECT 1 FROM DUAL
            testWhileIdle: true
            testOnBorrow: false
            testOnReturn: false
            webStatFilter:
                enabled: true
            statViewServlet:
                enabled: true
                # 允许访问的白名单，留空表示允许所有地址
                allow:
                url-pattern: /druid/*
                # 控制台登录账号密码
                login-username: ruoyi
                login-password: 123456
            filter:
                stat:
                    enabled: true
                    # 慢 SQL 记录
                    log-slow-sql: true
                    slow-sql-millis: 1000
                    merge-sql: true
                wall:
                    config:
                        multi-statement-allow: true